<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ household_name }}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --warn: #d97706;
      --border: #e2e8f0;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 620px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
      font-size: 15px;
      line-height: 1.55;
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; }
    header .subdomain { color: var(--muted); font-size: 0.85rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.2rem 0;
    }
    .stat-row + .stat-row { border-top: 1px solid var(--border); }
    .stat-label { color: var(--muted); font-size: 0.9rem; }
    .stat-value { font-weight: 600; font-size: 0.95rem; }
    .inline-form { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    select, input[type="text"] {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.4rem 0.7rem;
      font-size: 0.9rem;
      background: var(--surface);
      color: var(--text);
    }
    input[type="text"] { flex: 1; min-width: 0; }
    button {
      border: none;
      border-radius: var(--radius);
      padding: 0.45rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .msg { font-size: 0.875rem; padding: 0.4rem 0; }
    .msg-error { color: var(--danger); }
    .msg-success { color: var(--success); }
    .msg-warn { color: var(--warn); }
    .muted { color: var(--muted); font-size: 0.875rem; }
    details > summary { cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { color: var(--muted); }
    ul.plain { list-style: none; padding: 0; }
    ul.plain li { padding: 0.2rem 0; font-size: 0.875rem; color: var(--muted); border-top: 1px solid var(--border); }
    ul.plain li:first-child { border-top: none; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
  </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
